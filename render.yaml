services:
  - type: web
    name: o2c-graph-api
    runtime: node
    plan: standard
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter db generate && pnpm --filter graph build && pnpm --filter llm build && pnpm --filter api build
    startCommand: pnpm --filter api start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: graph-db
          property: connectionString
    healthCheckPath: /health
    region: ohio
